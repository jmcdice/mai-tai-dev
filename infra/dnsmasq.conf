# Don't read the host's resolv.conf or hosts file
no-resolv
no-hosts

# Bind only to the LAN IP — avoids conflict with systemd-resolved on 127.0.0.1:53
listen-address=192.168.86.39
bind-interfaces

# Upstream DNS servers
server=8.8.8.8
server=8.8.4.4
server=1.1.1.1

# Resolve all *.mai-tai.dev (and mai-tai.dev itself) to the NAS on the LAN
address=/mai-tai.dev/192.168.86.39

# Don't cache negative responses
no-negcache

# Log queries for debugging (comment out if too noisy)
log-queries
