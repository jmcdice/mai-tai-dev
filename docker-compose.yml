services:
  postgres:
    image: postgres:16-alpine
    container_name: maitai-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maitai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maitai_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-maitai}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maitai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maitai-backend
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.config/mai-tai:/host-mai-tai-config:ro
    environment:
      - PORT=8000
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-false}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-maitai}:${POSTGRES_PASSWORD:-maitai_dev_password}@postgres:5432/${POSTGRES_DB:-maitai}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - EXTRA_CORS_ORIGIN=${EXTRA_CORS_ORIGIN:-}
      - REGISTRATION_ENABLED=${REGISTRATION_ENABLED:-true}
      - AGENT_IMAGE=${AGENT_IMAGE:-mai-tai-agent:latest}
      - AGENT_NETWORK=mai-tai-dev_default
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    container_name: maitai-frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - INTERNAL_API_URL=http://backend:8000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
    depends_on:
      - backend

  dnsmasq:
    build:
      context: ./infra
      dockerfile: Dockerfile.dnsmasq
    container_name: maitai-dnsmasq
    network_mode: host
    volumes:
      - ./infra/dnsmasq.conf:/etc/dnsmasq.conf:ro
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

  caddy:
    image: caddy:latest
    container_name: maitai-caddy
    ports:
      - "8443:8443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
