name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend (Build + Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type Check
        run: cd frontend && npx tsc --noEmit

      - name: Build
        run: cd frontend && npm run build

  backend:
    name: Backend (Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
          
      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt
        
      - name: Install ruff
        run: pip install ruff
        
      - name: Lint with ruff
        run: cd backend && ruff check .

  backend-tests:
    name: Backend (Tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: maitai
          POSTGRES_PASSWORD: maitai
          POSTGRES_DB: maitai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt -r requirements-dev.txt

      - name: Run migrations (full chain up + down + up)
        run: cd backend && alembic upgrade head && alembic downgrade base && alembic upgrade head
        env:
          DATABASE_URL: postgresql://maitai:maitai@localhost:5432/maitai_test
          SECRET_KEY: test-secret-key-for-ci-only

      - name: Run tests
        run: cd backend && pytest tests -v
        env:
          DATABASE_URL: postgresql://maitai:maitai@localhost:5432/maitai_test
          SECRET_KEY: test-secret-key-for-ci-only

      - name: Install MCP package
        run: pip install -e "mcp-server[dev]"

      - name: MCP package tests
        run: pytest mcp-server/tests -v

      - name: Agent driver tests
        run: pytest agents/tests -v

  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          format: 'table'

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v5
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript, python
          
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript,python"

